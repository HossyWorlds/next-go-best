version: "2"
sql:
  - engine: "postgresql"
    # golang-migrate 形式（*.up.sql / *.down.sql）。sqlc は down を無視する。
    schema: "migrations"
    queries: "internal/db/queries"
    gen:
      go:
        package: "dbgen"
        out: "internal/db/gen"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
